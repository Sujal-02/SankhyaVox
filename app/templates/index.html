<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SankhyaVox</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <!-- Ambient background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <!-- Header -->
  <header class="app-header">
    <h1>SankhyaVox</h1>
    <p class="subtitle">Sanskrit Numeral Recognition</p>
  </header>

  <!-- Result display -->
  <div class="result-area">
    <!-- Rank 1 -->
    <div class="result-rank rank-1">
      <div id="result-label-1" class="result-label"></div>
      <div id="result-display-1" class="result-number">—</div>
      <div id="result-meta-1" class="result-meta"></div>
    </div>
    <!-- Rank 2 (isolated mode only) -->
    <div id="rank-2" class="result-rank rank-2" hidden>
      <div id="result-display-2" class="result-number">—</div>
      <div id="result-meta-2" class="result-meta"></div>
    </div>
    <!-- Rank 3 (isolated mode only) -->
    <div id="rank-3" class="result-rank rank-3" hidden>
      <div id="result-display-3" class="result-number">—</div>
      <div id="result-meta-3" class="result-meta"></div>
    </div>
  </div>

  <!-- Audio playback (shown after decode) -->
  <div id="playback-bar" class="playback-bar glass" hidden>
    <div class="playback-pair">
      <div class="playback-item">
        <span class="playback-label">Original</span>
        <audio id="audio-original" controls></audio>
      </div>
      <div class="playback-item">
        <span class="playback-label">Preprocessed</span>
        <audio id="audio-processed" controls></audio>
      </div>
    </div>
  </div>

  <!-- Bottom control bar -->
  <div class="control-bar glass">
    <!-- Checkpoint & mode settings -->
    <div class="settings-row">
      <div class="setting-group">
        <label for="checkpoint-select">HMM Checkpoint</label>
        <select id="checkpoint-select">
          <option value="">default</option>
        </select>
      </div>
      <div class="setting-group">
        <label for="mode-select">Decoder Mode</label>
        <select id="mode-select">
          <option value="compound" selected>Compound (0–99)</option>
          <option value="isolated">Isolated Token</option>
        </select>
      </div>
    </div>

    <!-- Actions row -->
    <div class="actions-row">
      <button id="btn-record" class="btn btn-record" title="Record audio">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="6"/>
        </svg>
        <span>Record</span>
      </button>

      <label class="btn btn-attach" title="Attach audio file">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
        <span>Attach</span>
        <input type="file" id="file-input" accept="audio/*,.wav,.mp3,.m4a,.flac,.ogg" hidden />
      </label>

      <button id="btn-submit" class="btn btn-submit" disabled title="Submit for recognition">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
        <span>Decode</span>
      </button>
    </div>

    <!-- Status -->
    <div id="status-bar" class="status-bar"></div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
